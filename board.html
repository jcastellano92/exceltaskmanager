<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product Management Tool</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <!-- Self-hosted (a CDN reference here gets blocked on locked-down corporate networks, which silently kills drag-and-drop). -->
  <script src="sortable.min.js"></script>
  <link rel="stylesheet" href="board.css" />
</head>
<body>

<!-- ───────────── TOP BAR ───────────── -->
<header class="topbar">
  <div class="topbar-left">
    <button id="back-to-stats" class="icon-btn" title="Back to stats">‹</button>
    <div class="brand"><span class="brand-dot"></span><span class="brand-text">Product Management Tool</span></div>
    <div class="view-toggle" id="view-mode-toggle">
      <button data-mode="mine">My Tasks</button>
      <button data-mode="list">List</button>
      <button data-mode="board" class="active">Board</button>
      <button data-mode="ws">Workstreams</button>
      <button data-mode="roadmap">Roadmap</button>
    </div>
  </div>

  <div class="topbar-middle">
    <input id="search-box" type="text" placeholder="🔍 Search tasks, owners, tags…" />
    <div class="filter-wrap">
      <button id="filter-btn" class="btn btn-secondary filter-btn" type="button">
        ⚙ Filters <span id="filter-count" class="filter-count" hidden>0</span>
      </button>
      <div id="filter-panel" class="filter-panel" hidden>
        <div class="fp-row"><label>Owner</label>
          <select id="filter-owner" class="filter"><option value="">All Owners</option></select></div>
        <div class="fp-row"><label>Workstream</label>
          <select id="filter-workstream" class="filter"><option value="">All Workstreams</option></select></div>
        <div class="fp-row"><label>Quarter</label>
          <select id="filter-quarter" class="filter"><option value="">All Quarters</option></select></div>
        <div class="fp-row"><label>Goal</label>
          <select id="filter-goal" class="filter"><option value="">All Goals</option></select></div>
        <div class="fp-row"><label>Health</label>
          <select id="filter-health" class="filter">
            <option value="">Any health</option>
            <option value="On Track">🟢 On Track</option>
            <option value="At Risk">🟡 At Risk</option>
            <option value="Off Track">🔴 Off Track</option>
          </select></div>
        <div class="fp-row"><label>Start date</label>
          <div class="fp-daterange">
            <input type="date" id="filter-start-from" class="filter" title="Start on/after" />
            <span class="fp-dash">–</span>
            <input type="date" id="filter-start-to" class="filter" title="Start on/before" />
          </div></div>
        <div class="fp-row"><label>Due date</label>
          <div class="fp-daterange">
            <input type="date" id="filter-due-from" class="filter" title="Due on/after" />
            <span class="fp-dash">–</span>
            <input type="date" id="filter-due-to" class="filter" title="Due on/before" />
          </div></div>
        <div class="fp-row"><label>Subtasks</label>
          <select id="filter-subtasks" class="filter">
            <option value="">Any</option>
            <option value="has">Has subtasks</option>
            <option value="none">No subtasks</option>
          </select></div>
        <div class="fp-row"><label>Tags</label>
          <div class="tag-multi" id="filter-tags">
            <span class="tag-multi-placeholder">Tags…</span>
            <div class="tag-multi-menu" id="tag-multi-menu" hidden></div>
          </div></div>
        <div class="fp-row"><label>Sort (board)</label>
          <select id="sort-toggle" class="filter">
            <option value="wsjf">Priority (WSJF) ↓</option>
            <option value="due">Due date ↑</option>
            <option value="pct">% complete ↓</option>
            <option value="title">Title A–Z</option>
            <option value="owner">Owner A–Z</option>
            <option value="manual">Manual order</option>
          </select></div>
        <div class="fp-row"><label>Group by (list)</label>
          <select id="group-toggle" class="filter">
            <option value="">None</option>
            <option value="WorkstreamID">Workstream</option>
            <option value="Owner">Owner</option>
            <option value="Quarter">Quarter</option>
            <option value="Status">Status</option>
            <option value="GoalID">Goal</option>
            <option value="Health">Health</option>
          </select></div>
        <div class="fp-actions">
          <button id="filter-clear" class="btn btn-secondary btn-sm" type="button">Clear all</button>
          <button id="filter-done" class="btn btn-primary btn-sm" type="button">Done</button>
        </div>
      </div>
    </div>
  </div>

  <div class="topbar-right">
    <button id="identity-chip" class="identity-chip unset" title="Set your name">👤</button>
    <span id="last-sync" class="sync-tag">Updated —</span>
    <button id="refresh-btn" class="icon-btn" title="Refresh">⟳</button>
    <button id="add-task-btn" class="btn btn-primary">+ Add Task</button>
    <button id="config-btn" class="icon-btn" title="Settings">⚙</button>
  </div>
</header>

<!-- ───────────── ACTIVE FILTER CHIPS ───────────── -->
<div id="active-filters" class="active-filters" hidden></div>

<!-- ───────────── KANBAN ───────────── -->
<main class="kanban" id="kanban">
  <!-- columns get rendered dynamically -->
</main>

<!-- ───────────── LIST VIEW ───────────── -->
<main class="listview" id="listview" hidden>
  <!-- table rendered dynamically -->
</main>

<!-- ───────────── CONFIG VIEW ───────────── -->
<main class="configview" id="configview" hidden>
  <!-- rendered dynamically -->
</main>

<!-- ───────────── MY TASKS DASHBOARD ───────────── -->
<main class="mineview" id="mineview" hidden>
  <!-- dashboard rendered dynamically -->
</main>

<!-- ───────────── WORKSTREAMS VIEW ───────────── -->
<main class="wsview" id="wsview" hidden>
  <!-- workstream cards rendered dynamically -->
</main>

<!-- ───────────── ROADMAP VIEW ───────────── -->
<main class="roadmapview" id="roadmapview" hidden>
  <!-- timeline rendered dynamically -->
</main>

<!-- ───────────── MODAL ───────────── -->
<div class="modal-overlay" id="modal-overlay" hidden>
  <div class="modal" id="task-modal">
    <header class="modal-header">
      <input id="m-title" class="modal-title-input" placeholder="Task title…" />
      <!-- People cluster: owner · contributors · allocation (top-right) -->
      <div class="modal-people" id="m-people">
        <div class="mp-block">
          <span class="mp-label">Owner</span>
          <select id="m-owner" class="mp-owner"></select>
        </div>
        <div class="mp-block">
          <span class="mp-label">Contributors</span>
          <div class="people-chips" id="m-contributors"></div>
        </div>
        <div class="cap-readout" id="m-capacity-readout" hidden></div>
      </div>
      <button class="close-btn" id="m-close">×</button>
    </header>

    <!-- META BAR (always visible) -->
    <div class="modal-meta">
      <div class="mm-health" id="m-health-flip"></div>
      <input type="hidden" id="m-health" value="" />
      <select id="m-status" class="mm-select" title="Status"></select>
      <select id="m-quarter" class="mm-select" title="Quarter"></select>
      <div class="mm-right">
        <div class="reschedule-row" id="m-reschedule" hidden>
          <button type="button" id="m-pull-earlier" class="btn-resched btn-win" title="Pull into an earlier quarter — completing sooner">⏪ Accelerate</button>
          <button type="button" id="m-slip-later" class="btn-resched btn-loss" title="Roll over to the next quarter — a slip">Delay ⏩</button>
        </div>
        <span class="mm-wsjf" title="Priority Score (WSJF)"><b id="m-wsjf-score">—</b><span>WSJF</span></span>
      </div>
    </div>

    <div class="modal-body3">
      <!-- MAIN (details) -->
      <div class="mb-main">
        <div class="details-grid">
          <div class="dg-main">
            <label class="field-label">Description</label>
            <textarea id="m-description" rows="3" placeholder="Describe the task…"></textarea>

            <!-- SUBTASKS (collapsible, under description) -->
            <div class="subtasks-block">
              <button type="button" class="subtasks-head" id="m-subtasks-toggle">
                <span class="st-caret" id="m-subtasks-caret">▸</span>
                Subtasks <span id="m-subtask-count" class="tab-count"></span>
              </button>
              <div class="subtasks-body" id="m-subtasks-body" hidden>
                <ul id="m-subtask-list" class="subtask-list"></ul>
                <button class="btn-link" id="m-add-subtask">+ Add subtask</button>
              </div>
            </div>

            <div class="dg-two">
              <div>
                <label class="field-label">Workstream</label>
                <select id="m-workstream"></select>
              </div>
              <div>
                <label class="field-label">Goals</label>
                <div class="contrib-checks" id="m-goal"></div>
              </div>
            </div>

            <label class="field-label">Tags</label>
            <div class="tag-input-wrap">
              <div class="tag-input-pills" id="m-tag-pills"></div>
              <input id="m-tag-input" type="text" placeholder="Type and press , or Enter…" />
              <div id="m-tag-suggest" class="tag-suggest" hidden></div>
            </div>

            <label class="field-label">Blocked By</label>
            <div class="blocked-by-wrap">
              <div class="blocked-pills" id="m-blocked-pills"></div>
              <button class="btn-link" id="m-blocked-add">+ Add</button>
              <div class="blocked-picker" id="m-blocked-picker" hidden></div>
            </div>

            <div class="section-block">
              <h4>Attachments</h4>
              <ul id="m-att-list" class="att-list"></ul>
              <button class="btn-link" id="m-add-att">+ Add Attachment</button>
              <div id="m-att-form" class="att-form" hidden>
                <input id="m-att-label" placeholder="Label" />
                <input id="m-att-url" placeholder="https://…" />
                <select id="m-att-type">
                  <option value="web">🌐 web</option>
                  <option value="confluence">📄 confluence</option>
                  <option value="sharepoint">📁 sharepoint</option>
                  <option value="file">📎 file</option>
                </select>
                <button class="btn btn-primary btn-sm" id="m-att-save">Add</button>
                <button class="btn btn-secondary btn-sm" id="m-att-cancel">Cancel</button>
              </div>
            </div>
          </div>

          <div class="dg-side">
            <div class="wsjf-panel dg-card">
              <h4 class="dg-card-h">Priority · WSJF</h4>
              <p class="wsjf-explain"><strong>Higher = do it sooner.</strong> (Value + Time-criticality + Risk/Opportunity) ÷ Job size, Fibonacci.</p>
              <div class="wsjf-sub muted">Now: <strong id="m-cod">—</strong> (<span id="m-ubv-readout">—</span>+<span id="m-tc-readout">—</span>+<span id="m-rr-readout">—</span>) ÷ effort <strong id="m-js-readout">—</strong></div>
              <div class="wsjf-inputs">
                <label title="Business/user value of finishing this">Business Value<select id="m-ubv"></select></label>
                <label title="How time-sensitive / does value decay if we wait">Time Criticality<select id="m-tc"></select></label>
                <label title="Reduces risk or unlocks other work / opportunities">Risk / Opportunity<select id="m-rr"></select></label>
                <label title="Effort to deliver — bigger = lower priority for same value">Job Size (effort)<select id="m-js"></select></label>
              </div>
            </div>

            <div class="dg-card">
              <h4 class="dg-card-h">Schedule</h4>
              <div class="dg-dates">
                <label class="field-label">Start<input type="date" id="m-start" /></label>
                <label class="field-label">Due<input type="date" id="m-due" /></label>
              </div>
              <label class="field-label checkbox-inline" id="m-autopct-row" hidden><input type="checkbox" id="m-autopct" /> Set % from subtasks</label>
              <label class="field-label">% Complete: <span id="m-pct-readout">0</span>%</label>
              <input type="range" min="0" max="100" id="m-pct" />
            </div>

            <div class="dg-card dg-meta-readonly">
              <span class="field-label">Epic</span> <span class="readonly" id="m-epic">—</span>
              <span class="field-label">Source</span> <span class="readonly" id="m-source">—</span>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT RAIL: Updates / Activity feed -->
      <aside class="mb-rail">
        <div class="rail-tabs" id="m-rail-tabs">
          <button type="button" data-rail="updates" class="active">Updates <span id="m-updates-count" class="tab-count"></span></button>
          <button type="button" data-rail="activity">Activity</button>
        </div>
        <div class="rail-pane" data-railpane="updates">
          <div id="m-updates-list" class="updates-list"></div>
          <div class="update-add">
            <textarea id="m-update-text" rows="2" placeholder="Add an update…"></textarea>
            <button class="btn btn-primary btn-sm" id="m-update-add">Post update</button>
          </div>
        </div>
        <div class="rail-pane" data-railpane="activity" hidden>
          <ul id="m-activity-list" class="activity-list"></ul>
        </div>
      </aside>
    </div>

    <footer class="modal-footer">
      <button class="btn btn-archive" id="m-archive">Archive</button>
      <div class="footer-right">
        <button class="btn btn-secondary" id="m-cancel">Cancel</button>
        <button class="btn btn-primary" id="m-save">Save</button>
      </div>
    </footer>
  </div>
</div>

<!-- toasts -->
<div id="toast-host" class="toast-host"></div>

<script src="data.js"></script>
<script src="board.js"></script>
</body>
</html>
